<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Power Automate Launcher</title>

<style>

:root{
--primary:#6750A4;
--success:#2e7d32;
--error:#d32f2f;
}

body{
margin:0;
min-height:100vh;
display:grid;
place-items:center;
font-family:Arial;
background:#eef3ff;
}

.card{
width:min(430px,90vw);
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:999px;
cursor:pointer;
}

.send{
background:var(--primary);
color:white;
}

.clear{
background:#ddd;
}

.status{
margin-top:20px;
}

.success{
color:var(--success);
}

.error{
color:var(--error);
}

</style>
</head>

<body>

<div class="card">

<h1>Power Automate</h1>

<input
id="sapLogin"
placeholder="Login SAP"
/>

<input
id="sapPassword"
type="password"
placeholder="Hasło SAP"
/>

<button
class="send"
onclick="wyslij()">
Wyślij
</button>

<button
class="clear"
onclick="wyczysc()">
Wyczyść
</button>

<div
id="status"
class="status">
</div>

</div>

<script>

const FLOW_URL =
"TWOJ_URL_POWER_AUTOMATE";

const STATUS_URL =
"TWOJ_URL_STATUS";

window.onload=()=>{

sapLogin.value=
localStorage.getItem(
"sapLogin"
)||"";

sapPassword.value=
localStorage.getItem(
"sapPassword"
)||"";

};

function zapisz(){

localStorage.setItem(
"sapLogin",
sapLogin.value
);

localStorage.setItem(
"sapPassword",
sapPassword.value
);

}

sapLogin.oninput=zapisz;
sapPassword.oninput=zapisz;

async function wyslij(){

status.innerHTML=
"⏳ Uruchamianie...";

try{

const requestId =
crypto.randomUUID();

localStorage.setItem(
"requestId",
requestId
);

const response=
await fetch(
FLOW_URL,
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

requestId,

sapLogin:
sapLogin.value,

sapPassword:
sapPassword.value

})
}
);

if(!response.ok)
throw Error();

status.innerHTML=
"⌛ Flow uruchomiony";

sprawdzStatus(
requestId
);

}
catch{

status.className=
"status error";

status.innerHTML=
"❌ Błąd";

}

}

async function sprawdzStatus(
requestId
){

const timer=
setInterval(
async()=>{

try{

const r=
await fetch(
`${STATUS_URL}?id=${requestId}`
);

const data=
await r.json();

if(
data.status==="completed"
){

clearInterval(
timer
);

status.className=
"status success";

status.innerHTML=
"✅ Zakończono pomyślnie";

}

}catch{}

},
3000
);

}

function wyczysc(){

localStorage.clear();

sapLogin.value="";
sapPassword.value="";

status.innerHTML="";

}

</script>

</body>

</html>
